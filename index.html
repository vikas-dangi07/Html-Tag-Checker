<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HTML Tag Checker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="container">
    <h1>HTML Tag Checker</h1>
    <textarea id="inputText" placeholder="Paste your HTML code here..."></textarea>
    <div class="buttons">
      <button id="checkBtn">Check Tags</button>
      <button id="clearBtn">Clear</button>
    </div>
    <div class="result">
      <div id="status" class="status">No check yet.</div>
      <ul id="errors"></ul>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
